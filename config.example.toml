# TARS configuration template.
#
# Copy this to:
#   Windows: C:\Users\<your-user>\.tars\config.toml
#   Linux:   /home/tars/.tars/config.toml   (chmod 600, owner tars)
#
# Fill in real secrets. NEVER commit the real config.toml — only this template.

timezone = "Asia/Jerusalem"

[telegram]
bot_token = "REPLACE_ME"             # from BotFather
allowed_chat_ids = [123456789]       # your numeric chat ID from @userinfobot

[openrouter]
api_key = "sk-or-REPLACE_ME"
daily_cap_usd = 5.0

[openai]
api_key = "sk-REPLACE_ME"
daily_cap_usd = 2.0

[voyage]
api_key = "pa-REPLACE_ME"

[paths]
# Use forward slashes even on Windows — Python normalizes them.
db = "C:/Users/reutn/.tars/tars.db"
vault = "C:/Users/reutn/.tars/vault"
backups = "C:/Users/reutn/.tars/backups"

[network]
dashboard_host = "127.0.0.1"
dashboard_port = 8088

[tiers]
# DeepSeek V3.2 for everything except live web research. Faster first-token,
# ~10x cheaper than gpt-5-mini, follows persona prompts more strictly.
interactive_fast = "deepseek/deepseek-v3.2"
cron_default = "deepseek/deepseek-v3.2"
ingest = "deepseek/deepseek-v3.2"
# :online enables OpenRouter's auto web-search plugin (~$5 per 1000 searches
# on top of model tokens). Only /research uses this tier, so cost stays bounded.
web_research = "openai/gpt-5:online"
